<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI for Programmers — Loading...</title>
    <style>
        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
    
    <script>
        (function() {
            const MOBILE_BREAKPOINT = 768;
            const PREF_KEY = 'ai-course-view-preference';
            
            // Check for saved preference
            const savedPref = localStorage.getItem(PREF_KEY);
            
            if (savedPref) {
                // Use saved preference
                window.location.replace(savedPref === 'skill-tree' 
                    ? 'ai-adoption-skill-tree.html' 
                    : 'ai-adoption-course.html');
            } else {
                // Default based on device
                const isMobile = window.innerWidth < MOBILE_BREAKPOINT;
                window.location.replace(isMobile 
                    ? 'ai-adoption-skill-tree.html' 
                    : 'ai-adoption-course.html');
            }
        })();
    </script>
</body>
</html>
